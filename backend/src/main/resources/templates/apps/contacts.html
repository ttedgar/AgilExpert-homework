<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contacts')}">
    <title>Contacts</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container" style="max-width: 480px">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:if="${userId != null}" th:href="@{/users/{id}/desktop(id=${userId})}"
               class="back-link d-inline-flex align-items-center">
                <i class="bi bi-chevron-left me-1"></i>Back
            </a>
            <div class="app-icon app-icon-CONTACTS" style="width:40px;height:40px;font-size:1rem">
                <i class="bi bi-person-lines-fill"></i>
            </div>
            <h1 class="page-title">Contacts</h1>
        </div>

        <div class="form-card">
            <div class="contacts-list">
                <div class="contact-row">
                    <div class="contact-avatar" style="background:#34C759">A</div>
                    <div>
                        <div class="fw-500">Anna Smith</div>
                        <div class="text-secondary small">+36 20 123 4567</div>
                    </div>
                </div>
                <div class="contact-row">
                    <div class="contact-avatar" style="background:#007AFF">B</div>
                    <div>
                        <div class="fw-500">Balázs Kovács</div>
                        <div class="text-secondary small">+36 30 987 6543</div>
                    </div>
                </div>
                <div class="contact-row">
                    <div class="contact-avatar" style="background:#FF9500">C</div>
                    <div>
                        <div class="fw-500">Clara Varga</div>
                        <div class="text-secondary small">+36 70 555 1234</div>
                    </div>
                </div>
                <div class="contact-row">
                    <div class="contact-avatar" style="background:#AF52DE">D</div>
                    <div>
                        <div class="fw-500">Dániel Tóth</div>
                        <div class="text-secondary small">+36 20 444 5678</div>
                    </div>
                </div>
                <div class="contact-row">
                    <div class="contact-avatar" style="background:#FF3B30">É</div>
                    <div>
                        <div class="fw-500">Éva Nagy</div>
                        <div class="text-secondary small">+36 30 321 9876</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
