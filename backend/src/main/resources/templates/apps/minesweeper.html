<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Minesweeper')}">
    <title>Minesweeper</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container" style="max-width: 480px">

        <a th:if="${userId != null}" th:href="@{/users/{id}/desktop(id=${userId})}"
           class="back-link mb-4 d-inline-flex align-items-center">
            <i class="bi bi-chevron-left me-1"></i>Back to Desktop
        </a>

        <div class="form-card text-center">
            <div class="app-icon app-icon-MINESWEEPER mx-auto mb-3" style="width:52px;height:52px;font-size:1.4rem">
                <i class="bi bi-flag-fill"></i>
            </div>
            <h1 class="page-title mb-1">Minesweeper</h1>
            <p class="text-secondary small mb-3">Find all mines without detonating them</p>

            <div id="status" class="mb-3 fw-500" style="min-height:24px"></div>

            <div id="mine-grid" class="mine-grid mx-auto mb-3"></div>

            <div class="d-flex align-items-center justify-content-between px-1 mb-3">
                <p class="text-secondary small mb-0">
                    <i class="bi bi-flag-fill text-danger me-1"></i><span id="flag-count">0</span> flagged
                    &nbsp;·&nbsp;
                    <i class="bi bi-bomb me-1"></i><span id="mine-count">10</span> mines
                </p>
                <button id="new-game-btn" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-clockwise me-1"></i>New Game
                </button>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ROWS = 8, COLS = 8, MINES = 10;
    const NUMBER_COLORS = ['', '#007AFF', '#34C759', '#FF3B30', '#AF52DE', '#FF9500', '#5AC8FA', '#000', '#8E8E93'];

    let board, gameOver, firstClick;

    function init() {
        board = Array.from({ length: ROWS }, (_, r) =>
            Array.from({ length: COLS }, (_, c) => ({
                r, c, mine: false, revealed: false, flagged: false, adjacent: 0
            }))
        );
        gameOver = false;
        firstClick = true;
        document.getElementById('status').textContent = '';
        render();
        updateCounters();
    }

    function placeMines(safeR, safeC) {
        let placed = 0;
        while (placed < MINES) {
            const r = Math.floor(Math.random() * ROWS);
            const c = Math.floor(Math.random() * COLS);
            const cell = board[r][c];
            if (!cell.mine && !(r === safeR && c === safeC)) {
                cell.mine = true;
                placed++;
            }
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (!board[r][c].mine) board[r][c].adjacent = countAdjacentMines(r, c);
            }
        }
    }

    function countAdjacentMines(r, c) {
        return neighbors(r, c).filter(([nr, nc]) => board[nr][nc].mine).length;
    }

    function neighbors(r, c) {
        const result = [];
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) result.push([nr, nc]);
            }
        }
        return result;
    }

    function reveal(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;

        if (firstClick) {
            firstClick = false;
            placeMines(r, c);
        }

        cell.revealed = true;

        if (cell.mine) {
            gameOver = true;
            revealAllMines();
            document.getElementById('status').innerHTML = '<span class="text-danger fw-600">💥 Game over!</span>';
            render();
            return;
        }

        if (cell.adjacent === 0) {
            neighbors(r, c).forEach(([nr, nc]) => reveal(nr, nc));
        }

        if (checkWin()) {
            gameOver = true;
            document.getElementById('status').innerHTML = '<span class="text-success fw-600">🎉 You win!</span>';
        }

        render();
        updateCounters();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        if (cell.revealed || gameOver) return;
        cell.flagged = !cell.flagged;
        render();
        updateCounters();
    }

    function revealAllMines() {
        board.flat().filter(c => c.mine).forEach(c => { c.revealed = true; });
    }

    function checkWin() {
        return board.flat().every(c => c.mine || c.revealed);
    }

    function updateCounters() {
        const flagged = board.flat().filter(c => c.flagged).length;
        document.getElementById('flag-count').textContent = flagged;
        document.getElementById('mine-count').textContent = MINES;
    }

    function render() {
        const grid = document.getElementById('mine-grid');
        grid.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = board[r][c];
                const el = document.createElement('div');
                el.className = 'mine-cell';

                if (!cell.revealed) {
                    el.classList.add('mine-hidden');
                    if (cell.flagged) {
                        el.classList.remove('mine-hidden');
                        el.classList.add('mine-flag');
                        el.innerHTML = '<i class="bi bi-flag-fill"></i>';
                    }
                } else if (cell.mine) {
                    el.classList.add('mine-exploded');
                    el.innerHTML = '<i class="bi bi-bomb-fill"></i>';
                } else if (cell.adjacent > 0) {
                    el.textContent = cell.adjacent;
                    el.style.color = NUMBER_COLORS[cell.adjacent];
                }

                el.addEventListener('click', () => reveal(r, c));
                el.addEventListener('contextmenu', e => { e.preventDefault(); toggleFlag(r, c); });
                grid.appendChild(el);
            }
        }
    }

    document.getElementById('new-game-btn').addEventListener('click', init);
    init();
</script>
</body>
</html>
