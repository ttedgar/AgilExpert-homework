<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('OpenMap')}">
    <title>OpenMap</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container-fluid px-4">

        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-3">
                <a th:if="${userId != null}" th:href="@{/users/{id}/desktop(id=${userId})}"
                   class="back-link d-inline-flex align-items-center">
                    <i class="bi bi-chevron-left me-1"></i>Back
                </a>
                <div class="app-icon app-icon-OPENMAP" style="width:40px;height:40px;font-size:1rem">
                    <i class="bi bi-map-fill"></i>
                </div>
                <h1 class="page-title">OpenMap</h1>
            </div>
        </div>

        <div class="map-container">
            <iframe
                src="https://www.openstreetmap.org/export/embed.html?bbox=14.0,47.0,23.0,48.5&amp;layer=mapnik"
                style="width:100%; height:100%; border:none;"
                title="OpenStreetMap">
            </iframe>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
