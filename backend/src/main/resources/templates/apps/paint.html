<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Paint')}">
    <title>Paint</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container" style="max-width: 720px">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:if="${userId != null}" th:href="@{/users/{id}/desktop(id=${userId})}"
               class="back-link d-inline-flex align-items-center">
                <i class="bi bi-chevron-left me-1"></i>Back
            </a>
            <div class="app-icon app-icon-PAINT" style="width:40px;height:40px;font-size:1rem">
                <i class="bi bi-brush-fill"></i>
            </div>
            <h1 class="page-title">Paint</h1>
        </div>

        <div class="form-card p-3">
            <!-- Toolbar -->
            <div class="paint-toolbar mb-3">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <label for="brushColor" class="text-secondary small">Color</label>
                    <input id="brushColor" type="color" value="#007AFF" class="color-picker">

                    <label for="brushSize" class="text-secondary small ms-2">Size</label>
                    <input id="brushSize" type="range" min="1" max="30" value="4" style="width:80px">

                    <button id="eraserBtn" class="btn btn-outline-secondary btn-sm rounded-pill ms-2">
                        <i class="bi bi-eraser me-1"></i>Eraser
                    </button>
                    <button id="clearBtn" class="btn btn-outline-danger btn-sm rounded-pill">
                        <i class="bi bi-trash me-1"></i>Clear
                    </button>
                </div>
            </div>

            <!-- Canvas -->
            <canvas id="canvas" style="border-radius:12px; cursor:crosshair; width:100%; touch-action:none;"></canvas>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = canvas.offsetWidth;
    canvas.height = 420;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let drawing = false;
    let erasing = false;

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
    }

    function startDraw(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineWidth = document.getElementById('brushSize').value;
        ctx.lineCap = 'round';
        ctx.strokeStyle = erasing ? '#ffffff' : document.getElementById('brushColor').value;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function stopDraw() { drawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDraw);

    document.getElementById('eraserBtn').addEventListener('click', () => { erasing = !erasing; });
    document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
</script>
</body>
</html>
