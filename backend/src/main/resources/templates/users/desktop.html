<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${user.name + '''s Desktop'})}">
    <title>Desktop</title>
</head>
<body th:style="${user.activeTheme != null ? '--primary:' + user.activeTheme.color + ';--primary-hover:' + user.activeTheme.color + ';--theme-bar-bg:' + user.activeTheme.color + ';--theme-bar-text:#ffffff' : ''}">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content"
      th:style="${user.activeWallpaper != null ? 'background-color:' + user.activeWallpaper.color : ''}">
    <div class="container-fluid px-4">

        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/users}" class="back-link d-inline-flex align-items-center">
                    <i class="bi bi-chevron-left me-1"></i>Users
                </a>
                <div>
                    <h1 class="page-title" th:text="${user.name + '''s Desktop'}"></h1>
                    <span class="text-secondary small" th:text="${menu.name}"></span>
                </div>
            </div>
            <a th:href="@{/users/{id}/menu/edit(id=${user.id}, menuId=${menu.id})}"
               class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-pencil me-1"></i>Edit Menu
            </a>
        </div>

        <!-- Breadcrumb for submenus -->
        <nav th:if="${menu.parentMenu != null}" class="mb-3">
            <a th:href="@{/users/{id}/desktop(id=${user.id})}"
               class="back-link d-inline-flex align-items-center">
                <i class="bi bi-chevron-left me-1"></i>Main Menu
            </a>
        </nav>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(menu.items)}" class="empty-state">
            <i class="bi bi-grid"></i>
            <p>No icons yet. <a th:href="@{/users/{id}/menu/edit(id=${user.id}, menuId=${menu.id})}">Add some.</a></p>
        </div>

        <!-- Icon grid -->
        <div class="desktop-grid">
            <div th:each="item : ${menu.items}">

                <!-- App shortcut -->
                <a th:if="${item.application != null}"
                   th:href="@{/app/{type}(type=${item.application.type.name().toLowerCase()})}"
                   class="desktop-icon-link">
                    <div class="app-icon" th:classappend="'app-icon-' + ${item.application.type.name()}">
                        <i th:class="${'bi ' + @appIconHelper.icon(item.application.type)}"></i>
                    </div>
                    <span class="icon-label" th:text="${item.name}"></span>
                </a>

                <!-- Submenu -->
                <a th:if="${item.subMenu != null}"
                   th:href="@{/users/{id}/desktop(id=${user.id}, menuId=${item.subMenu.id})}"
                   class="desktop-icon-link">
                    <div class="app-icon app-icon-FOLDER">
                        <i class="bi bi-folder-fill"></i>
                    </div>
                    <span class="icon-label" th:text="${item.name}"></span>
                </a>

            </div>
        </div>

        <!-- Bottom bar -->
        <div class="desktop-bottom-bar mt-5">
            <div class="d-flex align-items-center gap-4">
                <span class="bottom-bar-item">
                    <i class="bi bi-image me-1"></i>
                    <span th:text="${user.activeWallpaper != null ? user.activeWallpaper.name : 'No wallpaper'}"></span>
                </span>
                <span class="bottom-bar-item">
                    <i class="bi bi-palette me-1"></i>
                    <span th:text="${user.activeTheme != null ? user.activeTheme.name : 'No theme'}"></span>
                </span>
            </div>
            <a th:href="@{/users/{id}/appearance(id=${user.id})}"
               class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-sliders me-1"></i>Appearance
            </a>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
