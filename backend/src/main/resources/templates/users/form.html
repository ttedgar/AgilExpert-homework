<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${userId == null ? 'New User' : 'Edit User'})}">
    <title>User</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container" style="max-width: 480px">

        <a th:href="@{/users}" class="back-link mb-4 d-inline-flex align-items-center">
            <i class="bi bi-chevron-left me-1"></i>Users
        </a>

        <div class="form-card">
            <h1 class="page-title mb-4" th:text="${userId == null ? 'New User' : 'Edit User'}"></h1>

            <form th:action="${userId == null ? '/users' : '/users/' + userId}" method="post">
                <div class="mb-4">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-control smartos-input"
                           th:value="${userName}" placeholder="Enter name" required autofocus>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill flex-grow-1">
                        <th:block th:text="${userId == null ? 'Create User' : 'Save Changes'}"></th:block>
                    </button>
                    <a th:href="@{/users}" class="btn btn-outline-secondary rounded-pill flex-grow-1">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
