<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Users')}">
    <title>Users</title>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="container-fluid px-4">

        <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="page-title">Users</h1>
            <div class="d-flex gap-2">
                <form th:action="@{/simulation}" method="post">
                    <button type="submit" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                        <i class="bi bi-play-fill me-1"></i>Load Demo Data
                    </button>
                </form>
                <a th:href="@{/users/new}" class="btn btn-primary btn-sm rounded-pill px-3">
                    <i class="bi bi-plus me-1"></i>New User
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <i class="bi bi-people"></i>
            <p>No users yet. Create one or load demo data.</p>
        </div>

        <div class="row g-3">
            <div th:each="user : ${users}" class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="user-card">
                    <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.name, 0, 1))}"></div>
                    <div class="user-name" th:text="${user.name}"></div>
                    <a th:href="@{/users/{id}/desktop(id=${user.id})}" class="btn btn-primary btn-sm rounded-pill w-100 mb-2">
                        <i class="bi bi-display me-1"></i>Open Desktop
                    </a>
                    <div class="d-flex gap-2">
                        <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-outline-secondary btn-sm rounded-pill flex-grow-1">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" class="flex-grow-1"
                              onsubmit="return confirm('Delete this user?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill w-100">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
